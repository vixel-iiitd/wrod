services:
  backend:
    build:
      # Context is the project root so words.txt is accessible to the Dockerfile.
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      CORS_ORIGIN: "*"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # The browser connects to the backend, so this must be the host-visible URL.
        VITE_SERVER_URL: http://localhost:3001
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
